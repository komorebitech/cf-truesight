name: Deploy - Backend

on:
  push:
    branches: [master]
    paths: ['crates/**', 'Cargo.toml', 'Cargo.lock']
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - production

env:
  AWS_REGION: ap-south-1

jobs:
  deploy:
    name: Deploy ${{ matrix.service }}
    runs-on: ubuntu-24.04-arm

    strategy:
      matrix:
        service: [ingestion-api, ch-writer, admin-api]

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "TAG=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push ARM64 image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SERVICE: ${{ matrix.service }}
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/truesight/$SERVICE:$TAG" \
            -t "$ECR_REGISTRY/truesight/$SERVICE:latest" \
            -f "crates/$SERVICE/Dockerfile" \
            .
          docker push "$ECR_REGISTRY/truesight/$SERVICE:$TAG"
          docker push "$ECR_REGISTRY/truesight/$SERVICE:latest"

      - name: Register task definition and deploy
        env:
          SERVICE: ${{ matrix.service }}
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          # Substitute image tag in task definition
          sed -i "s|:latest|:$TAG|g" ecs-task-definitions/$SERVICE.json
          # Register new task definition revision
          aws ecs register-task-definition \
            --cli-input-json file://ecs-task-definitions/$SERVICE.json
          # Update ECS service to use latest task def
          aws ecs update-service \
            --cluster cityflo-analytics \
            --service "truesight-$SERVICE" \
            --task-definition "truesight-$SERVICE" \
            --force-new-deployment
